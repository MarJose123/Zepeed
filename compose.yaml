name: ""
services:
    app:
        container_name: App
        build:
            context: ./docker
            dockerfile: Dockerfile
            args:
                TIMEZONE: '${APP_TIMEZONE:-UTC}'
                HEALTHCHECK_PATH: '/up'
        environment:
            # Autorun
            AUTORUN_ENABLED: 'true'
            AUTORUN_DEBUG: '${APP_DEBUG:-false}'
            AUTORUN_LARAVEL_MIGRATION_DATABASE: '${AUTORUN_LARAVEL_MIGRATION_DATABASE:-mariadb}'
            AUTORUN_LARAVEL_CONFIG_CACHE: '${AUTORUN_LARAVEL_CONFIG_CACHE:-false}'
            AUTORUN_LARAVEL_EVENT_CACHE: '${AUTORUN_LARAVEL_EVENT_CACHE:-false}'
            AUTORUN_LARAVEL_OPTIMIZE: '${AUTORUN_LARAVEL_OPTIMIZE:-false}'
            AUTORUN_LARAVEL_ROUTE_CACHE: '${AUTORUN_LARAVEL_ROUTE_CACHE:-false}'
            AUTORUN_LARAVEL_VIEW_CACHE: '${AUTORUN_LARAVEL_VIEW_CACHE:-false}'
            AUTORUN_LARAVEL_MIGRATION_SEED: '${AUTORUN_LARAVEL_MIGRATION_SEED:-false}'
        ports:
            - '${APP_PORT:-8080}:8080'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        volumes:
            - .:/var/www/html
        networks:
            - zepeed
        depends_on:
            mariadb:
                condition: service_healthy
            mailpit:
                condition: service_healthy
            soketi:
                condition: service_healthy
    mariadb:
        container_name: Mariadb
        image: 'mariadb:11'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MARIADB_ROOT_PASSWORD: '${DB_PASSWORD:-zepeed}'
            MARIADB_ROOT_HOST: '${DB_HOST:-%}'
            MARIADB_DATABASE: '${DB_DATABASE:-zepeed}'
            MARIADB_USER: '${DB_USERNAME:-zepeed}'
            MARIADB_PASSWORD: '${DB_PASSWORD:-password}'
            MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: '1'
            MARIADB_EXTRA_FLAGS: '--innodb-use-native-aio=0'
        healthcheck:
            test: [ "CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized" ]
            start_period: 10s
            interval: 10s
            timeout: 5s
            retries: 3
        volumes:
            - 'zepeed-mariadb:/var/lib/mysql'
        networks:
            - zepeed
    soketi:
        container_name: Soketi
        image: 'quay.io/soketi/soketi:latest-16-alpine'
        restart: unless-stopped
        environment:
            SOKETI_DEFAULT_APP_ID: "${PUSHER_APP_ID:-zepeed}"
            SOKETI_DEFAULT_APP_KEY: "${PUSHER_APP_KEY:-zepeed}"
            SOKETI_DEFAULT_APP_SECRET: "${PUSHER_APP_SECRET:-zepeed}"
            # Bind to all interfaces so healthcheck and other containers can reach it
            SOKETI_HOST: "0.0.0.0"
            SOKETI_PORT: '6001'
            SOKETI_DEBUG: "${SOKETI_DEBUG:-0}"
            SOKETI_METRICS_ENABLED: "true"
            SOKETI_METRICS_SERVER_PORT: '9601'
        volumes:
            - ./storage:/var/www/html/storage
        ports:
            - '${VITE_PUSHER_PORT:-6001}:6001'
            - '${SOKETI_PORT_METRICS:-9601}:9601'
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9601/usage"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 10s
        networks:
            - zepeed
    mailpit:
        container_name: Mailpit
        image: 'axllent/mailpit:latest'
        ports:
            - "8025:8025" # Web UI
            - "1025:1025" # SMTP
        healthcheck:
            test: [ "CMD", "wget", "--spider", "--quiet", "http://localhost:8025/api/v1/info" ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 5s
        networks:
            - zepeed
networks:
    zepeed:

volumes:
    zepeed-mariadb:
        driver: local
