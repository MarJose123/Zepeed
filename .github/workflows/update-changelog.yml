name: "Update Changelog"

on:
  workflow_run:
    workflows: ["Auto Release on Tag"]
    types: [completed]

jobs:
  update:
    runs-on: ubuntu-latest

    # Only run if the release workflow succeeded
    if: github.event.workflow_run.conclusion == 'success'

    env:
      BRANCH_NAME: main

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ env.BRANCH_NAME }}
          fetch-depth: 0

      - name: Get latest release information
        id: release
        uses: actions/github-script@v9
        with:
          script: |
            // Fetch the latest release created by the workflow
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });

            if (releases.data.length === 0) {
              console.log('No releases found');
              process.exit(1);
            }

            const release = releases.data[0];
            console.log(`✓ Found release: ${release.name} (${release.tag_name})`);
            console.log(`  Published: ${release.published_at}`);

            core.setOutput('version', release.name);
            core.setOutput('tag', release.tag_name);
            core.setOutput('body', release.body || '');
            core.setOutput('published_at', release.published_at);

      - name: Display Release Information
        run: |
          echo "Release Version: ${{ steps.release.outputs.version }}"
          echo "Release Tag: ${{ steps.release.outputs.tag }}"
          echo "Published: ${{ steps.release.outputs.published_at }}"

      - name: Update Changelog
        uses: stefanzweifel/changelog-updater-action@v1
        with:
          latest-version: ${{ steps.release.outputs.version }}
          release-notes: ${{ steps.release.outputs.body }}

      - name: Commit updated CHANGELOG
        uses: stefanzweifel/git-auto-commit-action@v7.2.0
        with:
          branch: ${{ env.BRANCH_NAME }}
          commit_message: "chore: update changelog for ${{ steps.release.outputs.version }}"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          file_pattern: CHANGELOG.md
