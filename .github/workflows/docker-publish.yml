name: "Publish Docker Image"

on:
  # ── Automatic: triggers after "Auto Release on Tag" completes successfully ──
  workflow_run:
    workflows: ["Auto Release on Tag"]
    types: [completed]

  # ── Manual: allows on-demand builds from Actions tab ──────────────────────
  # Useful for re-publishing without a new release (e.g. base image security
  # patches) or for testing the pipeline against a specific tag/version.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build and publish (e.g. 1.1.0 — without the v prefix)"
        required: true
        type: string
      push_latest:
        description: "Also tag this build as :latest"
        required: false
        default: true
        type: boolean

jobs:
  docker:
    name: Build & push to Docker Hub
    runs-on: ubuntu-latest

    # For workflow_run: only proceed if the upstream release succeeded.
    # For workflow_dispatch: always proceed (no upstream conclusion to check).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout main (post-release commit)
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      # ── Resolve the version from whichever trigger fired ──────────────────
      - name: Resolve version
        id: version
        uses: actions/github-script@v9
        with:
          script: |
            let version, tag, isPrerelease;

            if (context.eventName === 'workflow_dispatch') {
              // Manual trigger — use the version the operator typed in
              version      = context.payload.inputs.version.replace(/^v/, '');
              tag          = `v${version}`;
              isPrerelease = false;

              console.log(`✓ Manual dispatch — building version: ${version}`);
            } else {
              // Automatic trigger — read from the latest GitHub release
              const releases = await github.rest.repos.listReleases({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                per_page: 1,
              });

              if (releases.data.length === 0) {
                core.setFailed('No releases found');
                return;
              }

              const release = releases.data[0];
              tag          = release.tag_name;
              version      = tag.replace(/^v/, '');
              isPrerelease = release.prerelease;

              console.log(`✓ Auto trigger — building release: ${tag} (${version})`);
            }

            core.setOutput('tag',          tag);
            core.setOutput('version',      version);
            core.setOutput('is_prerelease', String(isPrerelease));

      # ── Determine whether :latest should be pushed ────────────────────────
      - name: Resolve latest flag
        id: latest
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "push=${{ inputs.push_latest }}" >> $GITHUB_OUTPUT
          else
            # Auto trigger: push :latest only for non-prerelease builds
            if [ "${{ steps.version.outputs.is_prerelease }}" = "false" ]; then
              echo "push=true" >> $GITHUB_OUTPUT
            else
              echo "push=false" >> $GITHUB_OUTPUT
            fi
          fi

      # ── Docker meta — generates image tags + OCI labels automatically ─────
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: marjose123/zepeed
          flavor: |
            latest=${{ steps.latest.outputs.push }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }}

      # ── QEMU + Buildx for multi-platform (amd64 + arm64) ─────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
        with:
          driver-opts: image=moby/buildkit:latest

      # ── Authenticate with Docker Hub ──────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build and push ────────────────────────────────────────────────────
      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: docker/production/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Update Docker Hub README ──────────────────────────────────────────
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: marjose123/zepeed
          readme-filepath: ./README.md
          short-description: "Self-hosted internet speed test and network monitoring dashboard"
