name: "Publish Docker Image"

# Triggers only after the "Auto Release on Tag" workflow completes successfully.
# This guarantees: version committed to config/app.php → release created → image built.
on:
  workflow_run:
    workflows: ["Auto Release on Tag"]
    types: [completed]

jobs:
  docker:
    name: Build & push to Docker Hub
    runs-on: ubuntu-latest

    # Hard-guard: only run on successful upstream release
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout main (post-release commit)
        uses: actions/checkout@v6.0.3
        with:
          ref: main
          fetch-depth: 0

      # ── Resolve version from the tag that triggered the release ────────────
      - name: Resolve release version
        id: version
        uses: actions/github-script@v9
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              per_page: 1,
            });

            if (releases.data.length === 0) {
              core.setFailed('No releases found');
              return;
            }

            const release = releases.data[0];
            const tag     = release.tag_name;          // e.g. v1.1.0
            const version = tag.replace(/^v/, '');     // e.g. 1.1.0

            console.log(`✓ Building image for release: ${tag} (${version})`);

            core.setOutput('tag',          tag);
            core.setOutput('version',      version);
            core.setOutput('is_prerelease', String(release.prerelease));

      # ── Docker meta — generates image tags + OCI labels automatically ──────
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: marjose123/zepeed
          flavor: |
            latest=${{ steps.version.outputs.is_prerelease == 'false' }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }}

      # ── QEMU + Buildx for multi-platform (amd64 + arm64 for RPi/Proxmox) ──
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      # ── Authenticate with Docker Hub ───────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build and push ─────────────────────────────────────────────────────
      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          # Layer cache stored in GitHub Actions Cache — speeds up re-builds
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Update Docker Hub README from repo README.md ───────────────────────
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: marjose123/zepeed
          readme-filepath: ./README.md
          short-description: "Self-hosted internet speed test and network monitoring dashboard"
