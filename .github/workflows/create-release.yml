name: "Auto Release on Tag"

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate tag format
        id: validate
        run: |
          TAG="${{ github.ref_name }}"

          if [[ ! "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)(-.+)?$ ]]; then
            echo "::error::Invalid tag format: $TAG"
            echo "Expected format: v1.0.0, v1.0.0-beta.1, v1.0.0-beta1, etc."
            exit 1
          fi

          echo "✓ Tag format is valid: $TAG"
          echo "valid=true" >> $GITHUB_OUTPUT

      - name: Checkout repository
        if: steps.validate.outputs.valid == 'true'
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: main

      - name: Extract version from tag
        if: steps.validate.outputs.valid == 'true'
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT

          echo "::notice::Extracted version: ${VERSION}"
          echo "::notice::Build date: ${BUILD_DATE}"

      - name: Resolve previous tag
        if: steps.validate.outputs.valid == 'true'
        id: previous_tag
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "previous_tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT
            echo "::notice::Previous tag resolved: ${PREVIOUS_TAG}"
          else
            echo "previous_tag=" >> $GITHUB_OUTPUT
            echo "::notice::No previous tag found — this is the first release"
          fi

      - name: Update config/app.php with version
        if: steps.validate.outputs.valid == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_DATE="${{ steps.version.outputs.build_date }}"

          VERSION_ESCAPED=$(printf '%s\n' "$VERSION" | sed -e 's/[\/&]/\\&/g')
          BUILD_DATE_ESCAPED=$(printf '%s\n' "$BUILD_DATE" | sed -e 's/[\/&]/\\&/g')

          sed -i "s/'version' => '[^']*'/'version' => '${VERSION_ESCAPED}'/" config/app.php
          sed -i "s/'build_date' => '[^']*'/'build_date' => '${BUILD_DATE_ESCAPED}'/" config/app.php

          echo "::notice::Updated config/app.php"
          echo "---"
          grep "'version'" config/app.php | head -1
          grep "'build_date'" config/app.php | head -1

      - name: Verify config update
        if: steps.validate.outputs.valid == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_DATE="${{ steps.version.outputs.build_date }}"

          if grep -q "'version' => '${VERSION}'" config/app.php; then
            echo "✓ Version correctly updated to: ${VERSION}"
          else
            echo "::error::Version update verification failed"
            exit 1
          fi

          if grep -q "'build_date' => '${BUILD_DATE}'" config/app.php; then
            echo "✓ Build date correctly updated to: ${BUILD_DATE}"
          else
            echo "::error::Build date update verification failed"
            exit 1
          fi

      - name: Commit and push updated config
        if: steps.validate.outputs.valid == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update version and build_date to ${{ steps.version.outputs.version }}"
          file_pattern: config/app.php
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          branch: main

      - name: Create GitHub Release
        if: steps.validate.outputs.valid == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ steps.version.outputs.version }}"
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          generate_release_notes: true
          previous_tag: ${{ steps.previous_tag.outputs.previous_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
