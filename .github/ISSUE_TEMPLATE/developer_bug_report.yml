name: Bug Report (Developer)
description: Report a bug with technical details and environment info
title: "[BUG]: "
labels: ["bug", "triage", "technical"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us improve Zepeed with a technical bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide steps to reproduce or a link to a reproduction repository.
      placeholder: |
        1. Setup environment...
        2. Run command...
        3. See error in logs...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: |
        Please provide details about your environment:
        - OS: [e.g. Ubuntu 24.04, macOS Sonoma]
        - PHP Version: [e.g. 8.4]
        - Laravel Version: [e.g. 13.0]
        - Speedtest Provider: [e.g. Ookla, LibreSpeed, Fast.com]
      placeholder: |
        OS:
        PHP: 8.4
        Laravel: 13.0
        Provider:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Provide relevant logs:
        - Laravel logs (`storage/logs/laravel.log`)
        - Browser console logs
        - Speedtest CLI output
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other technical details, stack traces, or screenshots.
